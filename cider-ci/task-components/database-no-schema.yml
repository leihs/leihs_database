include:
  - cider-ci/task-components/database.yml

scripts:

  create-database:
    body: |
      #!/usr/bin/env bash
      set -euo pipefail
      unset PGPORT
      unset PGUSER
      ${LEIHS_DATABASE_DIR}/bin/create-db -p "${PG15PORT}" -U "${PG15USER}" "$LEIHS_DATABASE_NAME"

  test:
    start_when:
      database has been created:
        script_key: create-database
